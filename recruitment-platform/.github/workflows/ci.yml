name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # Backend — Lint, Test, Build
  # ============================================================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recruitment_test
          POSTGRES_PASSWORD: recruitment_test
          POSTGRES_DB: recruitment_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://recruitment_test:recruitment_test@localhost:5432/recruitment_platform_test
      JWT_SECRET: test-jwt-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-at-least-32-characters-long
      NODE_ENV: test
      LOG_LEVEL: silent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Unit tests
        working-directory: backend
        run: npm run test:unit

      - name: Integration tests
        working-directory: backend
        run: npm run test:integration

      - name: Build verification
        working-directory: backend
        run: node -e "require('./src/app')"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 5

  # ============================================================================
  # AI Service — Lint, Test
  # ============================================================================
  ai-service:
    name: AI Service CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        working-directory: ai-service
        run: pip install -r requirements.txt

      - name: Lint (Ruff)
        working-directory: ai-service
        run: ruff check app/ tests/

      - name: Type check format (Ruff)
        working-directory: ai-service
        run: ruff format --check app/ tests/

      - name: Unit tests
        working-directory: ai-service
        run: pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-coverage
          path: ai-service/coverage.xml
          retention-days: 5

  # ============================================================================
  # Frontend — Lint, Test, Build
  # ============================================================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  # ============================================================================
  # Docker — Build verification
  # ============================================================================
  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend, ai-service, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t recruitment-backend:ci --target production ./backend

      - name: Build AI service image
        run: docker build -t recruitment-ai-service:ci --target production ./ai-service

      - name: Build frontend image
        run: docker build -t recruitment-frontend:ci --target production ./frontend
