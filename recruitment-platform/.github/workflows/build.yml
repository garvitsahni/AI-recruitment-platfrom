name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        service: [backend, ai-service, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHA" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          target: production
          tags: |
            ${{ env.ECR_REGISTRY }}/recruitment-${{ matrix.service }}:${{ steps.tag.outputs.sha_tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/recruitment-{1}:latest', env.ECR_REGISTRY, matrix.service) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
