services:
  db:
    image: postgres:16-alpine
    container_name: recruitment-db
    environment:
      POSTGRES_USER: recruitment
      POSTGRES_PASSWORD: recruitment_dev
      POSTGRES_DB: recruitment_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruitment -d recruitment_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: recruitment-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://recruitment:recruitment_dev@db:5432/recruitment_platform?schema=public
      JWT_SECRET: dev-jwt-secret-do-not-use-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-do-not-use-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: debug
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 1000
      FUZZY_MATCH_THRESHOLD: 0.85
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      target: development
    container_name: recruitment-ai-service
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
      LLM_PROVIDER: ${LLM_PROVIDER:-google}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      BACKEND_URL: http://backend:3001
      FUZZY_MATCH_THRESHOLD: 0.85
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: recruitment-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
